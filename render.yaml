# Blueprint do Render — cria o serviço da API automaticamente.
# No painel do Render: New → Blueprint → conecte este repositório.
# As variáveis com "sync: false" você preenche manualmente no painel (segredos).
services:
  - type: web
    name: topodatum-api
    runtime: node
    rootDir: backend          # package.json e server.js ficam em /backend
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/cards
    envVars:
      - key: NODE_VERSION
        value: "18"
      # Frontend autorizado no CORS (o código já libera *.web.app, isto é reforço).
      - key: ALLOWED_ORIGINS
        value: https://ferramentas-e-correcoes.web.app,https://ferramentas-e-correcoes.firebaseapp.com
      # Segredos / conexão — preencha no painel do Render:
      - key: UPLOAD_KEY
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
